<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MaidConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 p-8 rounded-xl max-w-md w-full">
        <h1 class="text-3xl font-bold mb-6 text-center">Admin Login</h1>
        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email" required 
                class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white">
            <input type="password" id="password" placeholder="Password" required 
                class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white">
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold">
                Login
            </button>
        </form>
        <div id="error" class="mt-4 text-center text-red-400"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin/dashboard';
                } else {
                    document.getElementById('error').textContent = data.error;
                }
            } catch (err) {
                document.getElementById('error').textContent = 'Login failed';
            }
        });
    </script>
</body>
</html>
