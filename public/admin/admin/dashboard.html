<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MaidConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <nav class="bg-gray-800 p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold">Admin Dashboard</h1>
        <button onclick="logout()" class="bg-red-600 px-4 py-2 rounded">Logout</button>
    </nav>
    
    <div class="p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-xl">
                <h3 class="text-gray-400 text-sm">Total Workers</h3>
                <p class="text-3xl font-bold" id="workerCount">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl">
                <h3 class="text-gray-400 text-sm">Total Employers</h3>
                <p class="text-3xl font-bold" id="employerCount">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl">
                <h3 class="text-gray-400 text-sm">Status</h3>
                <p class="text-green-400 font-bold">● Live</p>
            </div>
        </div>
        
        <div class="bg-gray-800 p-6 rounded-xl">
            <h2 class="text-xl font-bold mb-4">Quick Actions</h2>
            <div class="space-y-2">
                <a href="/leaderboard" class="block bg-orange-500 hover:bg-orange-600 py-2 px-4 rounded">
                    View Promoter Leaderboard
                </a>
                <a href="/worker-leaderboard" class="block bg-blue-600 hover:bg-blue-700 py-2 px-4 rounded">
                    View Worker Leaderboard
                </a>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/admin';

        async function loadStats() {
            try {
                const res = await fetch('/api/admin/dashboard', {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('workerCount').textContent = data.stats.workers;
                    document.getElementById('employerCount').textContent = data.stats.employers;
                }
            } catch (err) {
                console.error('Failed to load stats');
            }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin';
        }

        loadStats();
    </script>
</body>
</html>
