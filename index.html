<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f5c518">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MaidConnect">
  <link rel="apple-touch-icon" href="/icon.png.jpg">
  <title>MaidConnect Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f0c29;
      color: white;
      min-height: 100vh;
    }
    header {
      background: #1a1740;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #f5c518;
    }
    header h1 { color: #f5c518; font-size: 1.8rem; }
    header p { color: #4ecdc4; margin-top: 5px; }
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 30px 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #1a1740;
      border-radius: 12px;
      padding: 20px 30px;
      text-align: center;
      border: 1px solid #2a2460;
      min-width: 140px;
    }
    .stat-card .number {
      font-size: 2.5rem;
      font-weight: bold;
      color: #f5c518;
    }
    .stat-card .label {
      color: #aaa;
      margin-top: 5px;
      font-size: 0.9rem;
    }
    .section {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }
    .section h2 {
      color: #4ecdc4;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }
    .event-list { display: flex; flex-direction: column; gap: 10px; }
    .event-item {
      background: #1a1740;
      border-radius: 10px;
      padding: 15px;
      border-left: 4px solid #f5c518;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .event-item.motion { border-left-color: #4ecdc4; }
    .event-type { font-weight: bold; font-size: 1rem; }
    .event-time { color: #aaa; font-size: 0.8rem; }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #4ecdc4;
      display: inline-block;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .refresh-btn {
      background: #f5c518;
      color: #0f0c29;
      border: none;
      padding: 10px 25px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .empty { color: #666; text-align: center; padding: 30px; }
    .db-status {
      text-align: center;
      padding: 10px;
      color: #4ecdc4;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <h1>✅ MaidConnect</h1>
  <p><span class="status-dot"></span>Dashboard — Live</p>
</header>

    <div class="label">Total Events</div>
  </div>

    <div class="number" id="doorbell-count">—</div>
